name: Renovate

# Runs Renovate via docker run (not the github-action wrapper) so stdout/stderr
# can be redirected away from the public Actions log and pushed to a branch in
# the target repo instead.
#
# When repository_id is omitted (or when triggered by schedule), a discover job
# lists every repo the GitHub App can access and fans out into a per-repo matrix.
# Each matrix leg has its own concurrency group (renovate-{id}) so individual
# triggers and "run all" jobs never queue behind unrelated repos.
#
# Repos are identified by numeric ID rather than name throughout the matrix and
# job labels. Names are only resolved inside each renovate job leg and
# immediately masked with core.setSecret() so they never appear in step logs or
# the Actions UI.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (empty = normal run)"
        type: choice
        options:
          - ""       # normal run
          - extract  # scan dependencies only, no update checks
          - lookup   # check for updates, no branch/PR changes
          - full     # full dry run, no writes
        default: ""
      repository_id:
        description: "Numeric GitHub repository ID to limit this run to (leave empty to run all)"
        type: string
        required: false
      log_level:
        description: "Renovate log level"
        type: choice
        options:
          - debug
          - info
          - warn
          - error
  schedule:
    # Run every day at 03:17 UTC (off-peak random time)
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: Get token (all repos)
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app_token
        with:
          client-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-metadata: read # list repos + resolve repo ID

      - name: List repositories
        id: list
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPO_ID: ${{ inputs.repository_id }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const repoId = process.env.REPO_ID;
            if (repoId) {
              core.setOutput('repos', JSON.stringify([{ id: repoId }]));
              return;
            }
            const allRepos = await github.paginate(
              github.rest.apps.listReposAccessibleToInstallation, {}
            );
            const repos = allRepos
              .filter(r => !r.archived)
              .map(r => ({ id: String(r.id) }));
            core.setOutput('repos', JSON.stringify(repos));

  renovate:
    needs: discover
    if: needs.discover.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.repos) }}
    concurrency:
      # Per-repo group so matrix legs and individual triggers share the same slot.
      group: renovate-${{ matrix.id }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get token (for all repos)
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app_token
        with:
          client-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-metadata: read # list repos + resolve repo ID

      - name: Resolve repo id to target repository
        id: target_repo
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const { data } = await github.request('GET /repositories/{repository_id}', { repository_id: ${{ matrix.id }} });
            core.setSecret(data.owner.login);
            core.setOutput('owner', data.owner.login);
            core.setSecret(data.name);
            core.setOutput('name', data.name);
            core.setSecret(data.full_name);
            core.setOutput('repo', data.full_name);
            core.exportVariable('RENOVATE_REPOSITORIES', JSON.stringify([data.full_name]));

      - name: Get token (for target repo)
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: target_token
        with:
          client-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ steps.target_repo.outputs.owner }}
          repositories: ${{ steps.target_repo.outputs.name }}
          permission-contents: write       # push log branch + Renovate dependency branches
          permission-issues: write         # post/update Dependency Dashboard comment
          permission-pull-requests: write  # Renovate creates and updates PRs
          permission-statuses: write       # Renovate sets commit status checks (e.g. renovate/stability-days)
          permission-workflows: write      # Renovate updates workflow files

      - name: Post running status to dashboard
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TARGET_OWNER: ${{ steps.target_repo.outputs.owner }}
          TARGET_REPO: ${{ steps.target_repo.outputs.name }}
          APP_SLUG: ${{ steps.target_token.outputs.app-slug }}
        with:
          github-token: ${{ steps.target_token.outputs.token }}
          script: |
            const { postEntry } = await import(`file://${process.env.GITHUB_WORKSPACE}/.github/scripts/dashboard-comment.mjs`);
            await postEntry(github, context, {
              owner: process.env.TARGET_OWNER,
              repo: process.env.TARGET_REPO,
              appSlug: process.env.APP_SLUG,
              entry: { ts: new Date().toISOString(), status: 'running' },
            });

      - name: Set Renovate image
        run: |
          # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate versioning=semver
          RENOVATE_IMAGE="ghcr.io/renovatebot/renovate:43.132.1@sha256:2ccc5b1f0340593c40e1598547aa98feee4e521a0906a423fe0be0431a733dfa"
          echo "RENOVATE_IMAGE=${RENOVATE_IMAGE}" >> "$GITHUB_ENV"

      - name: Restore Renovate repository cache
        id: cache_restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/renovate-cache/renovate/repository
          key: renovate-repo-cache-${{ runner.os }}-${{ matrix.id }}-${{ github.run_id }}
          restore-keys: renovate-repo-cache-${{ runner.os }}-${{ matrix.id }}-

      - name: Run Renovate
        id: renovate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RENOVATE_TOKEN: ${{ steps.target_token.outputs.token }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run }}
          RENOVATE_RUNNER_REPO: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.log_level || 'debug' }}
        with:
          script: |
            const fs = require('fs');
            const { PassThrough } = require('stream');
            const e = process.env;

            // Create cache dir and make every entry world-writable so the renovate container
            // user can write to it. Restored cache entries retain their original file mode,
            // so a recursive walk is needed to cover the full tree, not just the top-level dir.
            core.info('Preparing cache directory...');
            const cacheDir = `${e.RUNNER_TEMP}/renovate-cache/renovate/repository`;
            fs.mkdirSync(cacheDir, { recursive: true });
            fs.chmodSync(cacheDir, 0o777);
            for (const p of fs.readdirSync(cacheDir, { recursive: true })) {
              fs.chmodSync(`${cacheDir}/${p}`, 0o777);
            }

            // Suppress Actions log output and add timestamps to logs, avoiding leaking repo names
            core.info('Starting Renovate...');
            const out = new PassThrough();
            require('readline').createInterface({ input: out })
              .on('line', l => fs.appendFileSync('/tmp/renovate.log', `[${new Date().toISOString()}] ${l}\n`));

            const code = await exec.exec('docker', [
              'run', '--rm',
              '--volume', `${e.GITHUB_WORKSPACE}/config.js:/usr/src/app/config.js:ro`,
              '--volume', `${e.RUNNER_TEMP}/renovate-cache/renovate/repository:/tmp/renovate/cache/renovate/repository`,
              '--env', 'RENOVATE_RUNNER_REPO',
              '--env', 'RENOVATE_TOKEN',
              '--env', 'RENOVATE_REPOSITORIES',
              '--env', 'LOG_LEVEL',
              ...(e.RENOVATE_DRY_RUN ? ['--env', 'RENOVATE_DRY_RUN'] : []),
              e.RENOVATE_IMAGE,
            ], { ignoreReturnCode: true, outStream: out, errStream: out });

            core.info(`Renovate finished with exit code ${code}.`);
            core.setOutput('exit_code', String(code));
            if (code !== 0) core.setFailed(`Renovate exited with code ${code}`);

      - name: Clone target repo
        if: always() && steps.target_repo.outputs.repo != ''
        env:
          TOKEN: ${{ steps.target_token.outputs.token }}
        run: |
          git clone --quiet "https://x-access-token:${TOKEN}@github.com/${{ steps.target_repo.outputs.repo }}" target-repo 2>/dev/null

      - name: Get app user ID
        id: app_user_id
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.target_token.outputs.token }}
          script: |
            const { data } = await github.rest.users.getByUsername({ username: '${{ steps.target_token.outputs.app-slug }}[bot]' });
            core.setOutput('user-id', data.id);

      - name: Prepare log
        id: prepare_log
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const ts   = new Date().toISOString();
            const slug = ts.replace('T', '-').replace(/:/g, '').replace(/\.\d+Z$/, '');
            const logBranch = `renovate-logs/${slug}-${context.runId}`;
            const logFile   = `.github/logs/renovate-${slug}-${context.runId}.log`;
            fs.mkdirSync('target-repo/.github/logs', { recursive: true });
            fs.copyFileSync('/tmp/renovate.log', `target-repo/${logFile}`);
            core.setOutput('log_date',   ts);
            core.setOutput('log_file',   logFile);
            core.setOutput('log_branch', logBranch);

      - name: Post final status to dashboard
        id: final_status
        if: always() && steps.target_repo.outputs.repo != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TARGET_OWNER: ${{ steps.target_repo.outputs.owner }}
          TARGET_REPO: ${{ steps.target_repo.outputs.name }}
          APP_SLUG: ${{ steps.target_token.outputs.app-slug }}
          LOG_DATE: ${{ steps.prepare_log.outputs.log_date }}
          EXIT_CODE: ${{ steps.renovate.outputs.exit_code }}
        with:
          github-token: ${{ steps.target_token.outputs.token }}
          script: |
            const { postEntry } = await import(`file://${process.env.GITHUB_WORKSPACE}/.github/scripts/dashboard-comment.mjs`);
            const found = await postEntry(github, context, {
              owner: process.env.TARGET_OWNER,
              repo: process.env.TARGET_REPO,
              appSlug: process.env.APP_SLUG,
              entry: {
                ts:     process.env.LOG_DATE,
                status: process.env.EXIT_CODE === '0' ? 'success' : 'failure',
              },
              deleteBranches: true,
              retryOnMissing: true,
            });
            core.setOutput('has_dashboard', String(found));

      - name: Push log to branch
        id: push_log
        if: always() && steps.prepare_log.outcome == 'success' && steps.final_status.outputs.has_dashboard == 'true'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          repository: target-repo
          branch: ${{ steps.prepare_log.outputs.log_branch }}
          create_branch: true
          commit_message: "logs: renovate run ${{ github.run_id }}"
          commit_author: ${{ steps.target_token.outputs.app-slug }}[bot] <${{ steps.app_user_id.outputs.user-id }}+${{ steps.target_token.outputs.app-slug }}[bot]@users.noreply.github.com>
          commit_user_name: ${{ steps.target_token.outputs.app-slug }}[bot]
          commit_user_email: ${{ steps.app_user_id.outputs.user-id }}+${{ steps.target_token.outputs.app-slug }}[bot]@users.noreply.github.com
          file_pattern: ${{ steps.prepare_log.outputs.log_file }}

      - name: Save Renovate repository cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/renovate-cache/renovate/repository
          key: renovate-repo-cache-${{ runner.os }}-${{ matrix.id }}-${{ github.run_id }}
